<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#3b82f6" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="48" fill="#0f172a"/>
  
  <!-- Border accent -->
  <rect x="8" y="8" width="496" height="496" rx="40" fill="none" stroke="#3b82f6" stroke-width="5" opacity="0.7"/>
  <rect x="24" y="24" width="464" height="464" rx="32" fill="url(#grad)"/>
  
  <!-- Main content group -->
  <g filter="url(#shadow)">
    <!-- Background plate - maximized -->
    <rect x="48" y="48" width="416" height="416" rx="40" fill="#0f172a" stroke="#3b82f6" stroke-width="4"/>
    <rect x="48" y="48" width="416" height="416" rx="40" fill="url(#grad)"/>
    
    <!-- Stylized M - maximized size -->
    <text x="256" y="320" font-family="Georgia, serif" font-size="260" font-weight="900" font-style="italic" fill="#ffffff" text-anchor="middle" letter-spacing="-16">M</text>
    
    <!-- Top-right dot accent - larger -->
    <circle cx="368" cy="128" r="28" fill="#3b82f6" opacity="0.9"/>
    <circle cx="368" cy="128" r="40" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    
    <!-- Bottom accent line - thicker -->
    <rect x="208" y="348" width="96" height="10" rx="5" fill="#3b82f6" opacity="0.85"/>
    
    <!-- Glossy overlay -->
    <rect x="48" y="48" width="416" height="416" rx="40" fill="url(#gloss)"/>
  </g>
</svg>